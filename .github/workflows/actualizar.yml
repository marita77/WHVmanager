name: Actualizar página WHV diariamente

on:
  schedule:
    # Corre todos los días a las 12:00 UTC (09:00 Buenos Aires)
    - cron: '0 12 * * *'
  workflow_dispatch:
    # Permite correrlo manualmente desde GitHub con un botón

jobs:
  actualizar:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install requests

      - name: Generar página actualizada
        run: python generar_pagina.py

      - name: Publicar cambios en GitHub Pages
        run: |
          git config --global user.name "WHV Auto-Update"
          git config --global user.email "actions@github.com"
          git add index.html
          git diff --staged --quiet || git commit -m "Auto-update: $(date '+%d/%m/%Y %H:%M') UTC"
          git push
